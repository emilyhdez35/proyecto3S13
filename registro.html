<body>

    <h1>Creación de Usuarios</h1>

    <!-- FORM -->
    <form id="formUsuario">

        <label>Correo</label>
        <input type="email" name="correo" required>

        <label>Contraseña</label>
        <input type="password" name="contrasena" required>

        <label>Tipo de usuario</label>
        <select name="tipoUsuario">
            <option value="gestion">Gestión</option>
            <option value="administrador">Administrador</option>
        </select>

        <button type="submit">Registrar Usuario</button>

    </form>

    <h2>Lista de usuarios</h2>

    <table id="tablaUsuarios">
        <tr>
            <th>Correo</th>
            <th>Tipo</th>
        </tr>
    </table>

    <script>
        // REGISTRAR
        document.getElementById("formUsuario").addEventListener("submit", function (e) {
            e.preventDefault();

            let form = new FormData(this);
            form.append("accion", "registro");

            fetch("usuarioService.php", {
                method: "POST",
                body: form
            })
                .then(r => r.text())
                .then(alert)
                .then(cargar);
        });

        // LISTAR
        function cargar() {
            fetch("usuarioService.php?accion=listar")
                .then(r => r.json())
                .then(data => {
                    let tabla = document.getElementById("tablaUsuarios");

                    tabla.innerHTML = `
        <tr>
            <th>Correo</th>
            <th>Tipo</th>
        </tr>`;

                    data.forEach(u => {
                        tabla.innerHTML += `
            <tr>
                <td>${u.correo}</td>
                <td>${u.tipoUsuario}</td>
            </tr>`;
                    });
                });
        }

        cargar();
    </script>

</body>
<script>
    // REGISTRAR
    document.getElementById("formUsuario").addEventListener("submit", function (e) {
        e.preventDefault();

        let form = new FormData(this);
        form.append("accion", "registro");

        fetch("usuarioService.php", {
            method: "POST",
            body: form
        })
            .then(r => r.text())
            .then(alert)
            .then(cargar);
    });

    // ELIMINAR
    function eliminar(correo) {
        if (!confirm("¿Eliminar usuario?")) return;

        let form = new FormData();
        form.append("accion", "eliminar");
        form.append("correo", correo);

        fetch("usuarioService.php", {
            method: "POST",
            body: form
        })
            .then(r => r.text())
            .then(alert)
            .then(cargar);
    }

    // LISTAR
    function cargar() {
        fetch("usuarioService.php?accion=listar")
            .then(r => r.json())
            .then(data => {
                let tabla = document.getElementById("tablaUsuarios");

                tabla.innerHTML = `
        <tr>
            <th>Correo</th>
            <th>Tipo</th>
            <th>Acción</th>
        </tr>`;

                data.forEach(u => {

                    // ❌ ocultar admins
                    if (u.tipoUsuario === "administrador") return;

                    tabla.innerHTML += `
            <tr>
                <td>${u.correo}</td>
                <td>${u.tipoUsuario}</td>
                <td>
                    <button type="button" onclick="eliminar('${u.correo}')">
                        Eliminar
                    </button>
                </td>
            </tr>`;
                });
            });
    }

    cargar();
</script>
